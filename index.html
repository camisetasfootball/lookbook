        <!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lookbook — Colección Privada</title>
    <style>
        :root {
            --bg: #fafafa;
            --text: #111;
            --muted: #888;
            --accent: #0088cc;
            --card: #fff;
            --border: #eee;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }

        header {
            position: sticky;
            top: 0;
            background: rgba(250, 250, 250, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            padding: 1.2rem 2rem;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand {
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            text-transform: uppercase;
        }

        .telegram-btn {
            background: var(--accent);
            color: white;
            text-decoration: none;
            padding: 0.6rem 1.2rem;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .telegram-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0, 136, 204, 0.3);
        }

        .telegram-btn svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        .category {
            margin-bottom: 3.5rem;
        }

        .category-title {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--muted);
            margin-bottom: 1.5rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid var(--text);
            display: inline-block;
        }

        .subcategory {
            font-size: 1rem;
            color: #666;
            margin: 1.5rem 0 1rem 0;
            padding-left: 0.5rem;
            border-left: 3px solid #111;
        }

        .subsubcategory {
            font-size: 0.95rem;
            color: #888;
            margin: 1rem 0 1rem 1rem;
            font-weight: 500;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 1.5rem;
        }

        .product {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.3s, box-shadow 0.3s;
            display: flex;
            flex-direction: column;
        }

        .product:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }

        /* Carrusel simple y robusto */
        .carousel-wrap {
            position: relative;
            width: 100%;
            overflow: hidden;
        }
        .carousel-slides {
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }
        .carousel-slides::-webkit-scrollbar {
            display: none;
        }
        .carousel-slides img {
            flex: 0 0 100%;
            scroll-snap-align: start;
            width: 100%;
            aspect-ratio: 3/4;
            object-fit: cover;
            display: block;
            pointer-events: none;
            user-select: none;
            -webkit-user-drag: none;
        }
        .carousel-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255,255,255,0.85);
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            font-size: 20px;
            line-height: 1;
            cursor: pointer;
            z-index: 2;
            display: flex;
            align-items: center;
            justify-content: center;
            padding-bottom: 2px;
        }
        .carousel-nav.prev { left: 8px; }
        .carousel-nav.next { right: 8px; }

        .product-info {
            padding: 1.2rem;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .product-name {
            font-weight: 600;
            font-size: 1.05rem;
            margin-bottom: 0.3rem;
        }

        .product-meta {
            color: var(--muted);
            font-size: 0.85rem;
            margin-bottom: 1rem;
        }

        .product-price {
            font-size: 1.2rem;
            font-weight: 700;
            margin-top: auto;
            margin-bottom: 1rem;
        }

        .order-btn {
            display: block;
            text-align: center;
            background: var(--text);
            color: white;
            text-decoration: none;
            padding: 0.8rem;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.9rem;
            transition: background 0.2s;
        }

        .order-btn:hover {
            background: #333;
        }

        footer {
            text-align: center;
            padding: 3rem 2rem;
            color: var(--muted);
            font-size: 0.85rem;
            border-top: 1px solid var(--border);
            margin-top: 2rem;
        }

        footer a {
            color: var(--accent);
            text-decoration: none;
        }

        @media (max-width: 600px) {
            header {
                padding: 1rem;
            }
            .container {
                padding: 1rem;
            }
            .grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 1rem;
            }
            .carousel-nav {
                opacity: 1;
            }
        }
    </style>
</head>
<body>
