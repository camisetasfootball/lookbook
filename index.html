<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lookbook — Colección Privada</title>
    <style>
        :root {
            --bg: #fafafa;
            --text: #111;
            --muted: #888;
            --accent: #0088cc;
            --card: #fff;
            --border: #eee;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            overflow-x: hidden;
        }

        body.lightbox-open {
            overflow: hidden;
        }

        header {
            position: sticky;
            top: 0;
            background: rgba(250, 250, 250, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            padding: 1.2rem 2rem;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand {
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            text-transform: uppercase;
        }

        .telegram-btn {
            background: var(--accent);
            color: white;
            text-decoration: none;
            padding: 0.6rem 1.2rem;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .telegram-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0, 136, 204, 0.3);
        }

        .telegram-btn svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        .category {
            margin-bottom: 3.5rem;
        }

        .category-title {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--muted);
            margin-bottom: 1.5rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid var(--text);
            display: inline-block;
        }

        .subcategory {
            font-size: 1rem;
            color: #666;
            margin: 1.5rem 0 1rem 0;
            padding-left: 0.5rem;
            border-left: 3px solid #111;
        }

        .subsubcategory {
            font-size: 0.95rem;
            color: #888;
            margin: 1rem 0 1rem 1rem;
            font-weight: 500;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 1.5rem;
        }

        .product {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.3s, box-shadow 0.3s;
            display: flex;
            flex-direction: column;
        }

        .product:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }

        .product-thumb {
            position: relative;
            width: 100%;
            aspect-ratio: 3/4;
            overflow: hidden;
            cursor: pointer;
        }

        .product-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.3s;
        }

        .product-thumb:hover img {
            transform: scale(1.03);
        }

        .thumb-badge {
            position: absolute;
            bottom: 10px;
            right: 10px;
            background: rgba(0,0,0,0.6);
            color: white;
            font-size: 0.75rem;
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: 500;
            pointer-events: none;
        }

        .product-info {
            padding: 1.2rem;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .product-name {
            font-weight: 600;
            font-size: 1.05rem;
            margin-bottom: 0.3rem;
        }

        .product-meta {
            color: var(--muted);
            font-size: 0.85rem;
            margin-bottom: 1rem;
        }

        .product-price {
            font-size: 1.2rem;
            font-weight: 700;
            margin-top: auto;
            margin-bottom: 1rem;
        }

        .order-btn {
            display: block;
            text-align: center;
            background: var(--text);
            color: white;
            text-decoration: none;
            padding: 0.8rem;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.9rem;
            transition: background 0.2s;
        }

        .order-btn:hover {
            background: #333;
        }

        .lightbox {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .lightbox.active {
            display: flex;
        }

        .lightbox-close {
            position: absolute;
            top: 15px;
            right: 20px;
            background: none;
            border: none;
            color: white;
            font-size: 2.5rem;
            cursor: pointer;
            z-index: 1002;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .lightbox-main {
            position: relative;
            width: 100%;
            max-width: 600px;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px 20px 20px;
        }

        .lightbox-main img {
            max-width: 100%;
            max-height: 70vh;
            object-fit: contain;
            border-radius: 4px;
            user-select: none;
            -webkit-user-drag: none;
        }

        .lightbox-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255,255,255,0.15);
            border: none;
            color: white;
            font-size: 2rem;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            cursor: pointer;
            z-index: 1001;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
        }

        .lightbox-nav.prev { left: 10px; }
        .lightbox-nav.next { right: 10px; }

        .lightbox-thumbs {
            display: flex;
            gap: 8px;
            padding: 15px;
            overflow-x: auto;
            max-width: 100%;
            scrollbar-width: none;
        }

        .lightbox-thumbs::-webkit-scrollbar {
            display: none;
        }

        .lightbox-thumb {
            flex: 0 0 70px;
            height: 70px;
            border-radius: 6px;
            overflow: hidden;
            cursor: pointer;
            border: 2px solid transparent;
            opacity: 0.6;
            transition: all 0.2s;
        }

        .lightbox-thumb.active {
            border-color: white;
            opacity: 1;
        }

        .lightbox-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .lightbox-counter {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: 0.9rem;
            background: rgba(0,0,0,0.4);
            padding: 4px 14px;
            border-radius: 20px;
        }

        footer {
            text-align: center;
            padding: 3rem 2rem;
            color: var(--muted);
            font-size: 0.85rem;
            border-top: 1px solid var(--border);
            margin-top: 2rem;
        }

        footer a {
            color: var(--accent);
            text-decoration: none;
        }

        @media (max-width: 600px) {
            header {
                padding: 1rem;
            }
            .container {
                padding: 1rem;
            }
            .grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 1rem;
            }
            .lightbox-main img {
                max-height: 60vh;
            }
            .lightbox-thumb {
                flex: 0 0 55px;
                height: 55px;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="brand">Lookbook</div>
        <a href="https://t.me/pacopoyo" target="_blank" class="telegram-btn">
            <svg viewBox="0 0 24 24"><path d="M9.78 18.65l.28-4.23 7.68-6.92c.34-.31-.07-.46-.52-.19L7.74 13.3 3.64 12c-.88-.25-.89-.86.2-1.3l15.97-6.16c.73-.33 1.43.18 1.15 1.3l-2.72 12.81c-.19.91-.74 1.13-1.5.71L12.6 16.3l-1.99 1.93c-.23.23-.42.42-.83.42z"/></svg>
            Pedidos por Telegram
        </a>
    </header>

    <div class="container">

        <section class="category">
            <h2 class="category-title">Camisetas versión fan — 18,00 €</h2>
            <h3 class="subcategory">Camisetas selecciones nacionales</h3>
            <h4 class="subsubcategory">🇪🇸 España</h4>

            <div class="grid" style="margin-left:1rem;">

                <article class="product">
                    <div class="product-thumb" onclick="openLightbox(0)">
                        <img src="https://camisetasfootball.github.io/lookbook/espana_local_fan_26.3.jpg" alt="España 2026 Fan">
                        <span class="thumb-badge">📷 11 fotos</span>
                    </div>
                    <div class="product-info">
                        <div class="product-name">España 2026 Fan</div>
                        <div class="product-meta">Local y visitante · Versión aficionado · Tallas consultar</div>
                        <div class="product-price">18,00 €</div>
                        <a href="https://t.me/pacopoyo?text=Hola,%20quiero:%20España%202026%20Fan%20(Talla:%20)" class="order-btn">Solicitar pedido</a>
                    </div>
                </article>

            </div>
        </section>

    </div>

    <div class="lightbox" id="lightbox" onclick="closeLightboxOutside(event)">
        <button class="lightbox-close" onclick="closeLightbox()">&times;</button>
        <span class="lightbox-counter" id="lightboxCounter">1 / 11</span>

        <div class="lightbox-main">
            <button class="lightbox-nav prev" onclick="prevImage(event)">‹</button>
            <img id="lightboxImg" src="" alt="">
            <button class="lightbox-nav next" onclick="nextImage(event)">›</button>
        </div>

        <div class="lightbox-thumbs" id="lightboxThumbs"></div>
    </div>

    <footer>
        <p>Para pedidos y consultas, escríbeme por <a href="https://t.me/pacopoyo" target="_blank">Telegram</a>.</p>
        <p style="margin-top:0.5rem; opacity:0.6;">Lookbook · 2026</p>
    </footer>

    <script>
        const images = [
            "https://camisetasfootball.github.io/lookbook/espana_local_fan_26.3.jpg",
            "https://camisetasfootball.github.io/lookbook/espa%C3%B1a_local_fan_26.4.jpg",
            "https://camisetasfootball.github.io/lookbook/espa%C3%B1a_local_fan_26.5.jpg",
            "https://camisetasfootball.github.io/lookbook/espa%C3%B1a_local_fan_26.6.jpg",
            "https://camisetasfootball.github.io/lookbook/espa%C3%B1a_local_fan_26.7.jpg",
            "https://camisetasfootball.github.io/lookbook/espa%C3%B1a_visitante_fan_26.jpg",
            "https://camisetasfootball.github.io/lookbook/espa%C3%B1a_visitante_fan_26.3.jpg",
            "https://camisetasfootball.github.io/lookbook/espa%C3%B1a_visitante_fan_26.4.jpg",
            "https://camisetasfootball.github.io/lookbook/espa%C3%B1a_visitante_fan_26.5.jpg",
            "https://camisetasfootball.github.io/lookbook/espa%C3%B1a_visitante_fan_26.6.jpg",
            "https://camisetasfootball.github.io/lookbook/espa%C3%B1a_visitante_fan_26.7.jpg"
        ];

        let currentIndex = 0;

        function openLightbox(startIndex) {
            currentIndex = startIndex || 0;
            const box = document.getElementById('lightbox');
            const thumbs = document.getElementById('lightboxThumbs');

            thumbs.innerHTML = images.map((src, i) =>
                `<div class="lightbox-thumb ${i === currentIndex ? 'active' : ''}" onclick="goToImage(${i})">
                    <img src="${src}" alt="">
                </div>`
            ).join('');

            updateLightbox();
            box.classList.add('active');
            document.body.classList.add('lightbox-open');
        }

        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('active');
            document.body.classList.remove('lightbox-open');
        }

        function closeLightboxOutside(e) {
            if (e.target.id === 'lightbox') closeLightbox();
        }

        function updateLightbox() {
            document.getElementById('lightboxImg').src = images[currentIndex];
            document.getElementById('lightboxCounter').textContent = (currentIndex + 1) + ' / ' + images.length;

            document.querySelectorAll('.lightbox-thumb').forEach((t, i) => {
                t.classList.toggle('active', i === currentIndex);
            });

            const activeThumb = document.querySelectorAll('.lightbox-thumb')[currentIndex];
            if (activeThumb) activeThumb.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
        }

        function nextImage(e) {
            e.stopPropagation();
            currentIndex = (currentIndex + 1) % images.length;
            updateLightbox();
        }

        function prevImage(e) {
            e.stopPropagation();
            currentIndex = (currentIndex - 1 + images.length) % images.length;
            updateLightbox();
        }

        function goToImage(index) {
            currentIndex = index;
            updateLightbox();
        }

        let touchStartX = 0;
        let touchEndX = 0;
        const lightboxMain = document.querySelector('.lightbox-main');

        lightboxMain.addEventListener('touchstart', e => {
            touchStartX = e.changedTouches[0].screenX;
        }, {passive: true});

        lightboxMain.addEventListener('touchend', e => {
            touchEndX = e.changedTouches[0].screenX;
            handleSwipe();
        }, {passive: true});

        function handleSwipe() {
            const diff = touchStartX - touchEndX;
            if (Math.abs(diff) > 50) {
                if (diff > 0) {
                    currentIndex = (currentIndex + 1) % images.length;
                } else {
                    currentIndex = (currentIndex - 1 + images.length) % images.length;
                }
                updateLightbox();
            }
        }
    </script>

</body>
</html>
